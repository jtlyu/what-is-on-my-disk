name: Feature request
description: Suggest an enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: { label: What problem does this solve? }
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes: { label: Proposal }
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes: { label: Alternatives considered }
