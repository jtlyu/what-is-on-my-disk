version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule: { interval: monthly }
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: npm
    directory: "/apps/desktop"
    schedule: { interval: monthly }
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: monthly }
    open-pull-requests-limit: 3
