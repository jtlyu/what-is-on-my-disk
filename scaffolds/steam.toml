id          = "steam"
name        = "Steam"
homepage    = "https://store.steampowered.com/"
risk        = "medium"
disclaimer  = "Removes only download / shader / workshop caches. Installed games and saves are not touched. Shader cache will be rebuilt on first run after."

detect = [
  "**/Steam/steamapps/downloading",
  "**/Steam/steamapps/shadercache",
  "**/Steam/steamapps/workshop",
  "**/Steam",
]

[match]
name_contains   = ["Steam"]
must_have_child = ["steamapps"]

[[scope]]
id    = "downloading"
label = "Pending downloads (steamapps/downloading)"
glob  = "**/steamapps/downloading/**"
mode  = "recycle"

[[scope]]
id    = "shadercache"
label = "Shader cache (steamapps/shadercache)"
glob  = "**/steamapps/shadercache/**"
mode  = "recycle"

[[scope]]
id    = "workshop-cache"
label = "Workshop temp (steamapps/workshop/temp)"
glob  = "**/steamapps/workshop/temp/**"
mode  = "recycle"
