id          = "pip"
name        = "pip cache"
homepage    = "https://pip.pypa.io/en/stable/topics/caching/"
risk        = "low"
disclaimer  = "Cleans pip's wheel and HTTP caches. Equivalent to `pip cache purge`."

detect = [
  "%LOCALAPPDATA%/pip/cache",
  "${HOME}/.cache/pip",
  "${HOME}/Library/Caches/pip",
]

[match]
name_contains   = ["pip"]
must_have_child = ["http", "wheels"]

[[scope]]
id    = "http"
label = "HTTP cache"
glob  = "**/http/**"
mode  = "recycle"

[[scope]]
id    = "wheels"
label = "Built wheels"
glob  = "**/wheels/**"
mode  = "recycle"
