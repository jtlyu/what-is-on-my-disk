id          = "huggingface"
name        = "Hugging Face Hub cache"
homepage    = "https://huggingface.co/docs/huggingface_hub/"
risk        = "medium"
disclaimer  = "These are downloaded model weights and datasets. Deleting will require re-downloading (potentially many GB). Prefer `huggingface-cli delete-cache` for selective cleanup."

detect = [
  "${HOME}/.cache/huggingface",
  "%USERPROFILE%/.cache/huggingface",
]

[match]
name_contains   = ["huggingface"]

[[scope]]
id    = "hub"
label = "Model & dataset hub cache"
glob  = "**/hub/**"
mode  = "recycle"

[[scope]]
id    = "transformers"
label = "Legacy transformers cache"
glob  = "**/transformers/**"
mode  = "recycle"
