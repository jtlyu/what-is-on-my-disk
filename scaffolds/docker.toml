id          = "docker"
name        = "Docker / Docker Desktop"
homepage    = "https://www.docker.com/"
risk        = "high"
disclaimer  = "Docker disk usage is best cleaned via `docker system prune -a` and `docker buildx prune`. This scaffold marks well-known cache subtrees, but resist deleting the WSL2 vhdx file directly — use Docker Desktop's reset instead."

detect = [
  "%LOCALAPPDATA%/Docker",
  "%APPDATA%/Docker Desktop",
  "${HOME}/.docker",
  "${HOME}/Library/Containers/com.docker.docker",
]

[match]
name_contains   = ["Docker"]

[[scope]]
id    = "buildx-cache"
label = "buildx cache"
glob  = "**/buildx/**"
mode  = "recycle"

[[scope]]
id    = "scout-cache"
label = "Docker Scout cache"
glob  = "**/scout/**"
mode  = "recycle"

[[scope]]
id    = "logs"
label = "Logs"
glob  = "**/log/**"
mode  = "recycle"
