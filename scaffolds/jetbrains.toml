id          = "jetbrains"
name        = "JetBrains IDEs"
homepage    = "https://www.jetbrains.com/"
risk        = "low"
disclaimer  = "Cleans caches/logs/system folders for IntelliJ, PyCharm, WebStorm, GoLand, Rider, etc. Settings (config) are not touched. Indexes will rebuild on next IDE launch."

detect = [
  "%LOCALAPPDATA%/JetBrains",
  "${HOME}/Library/Caches/JetBrains",
  "${HOME}/.cache/JetBrains",
]

[match]
name_contains   = ["JetBrains"]

[[scope]]
id    = "caches"
label = "Caches"
glob  = "**/caches/**"
mode  = "recycle"

[[scope]]
id    = "logs"
label = "Logs"
glob  = "**/log/**"
mode  = "recycle"

[[scope]]
id    = "system-index"
label = "System / index"
glob  = "**/system/**"
mode  = "recycle"
