id          = "chrome"
name        = "Google Chrome"
homepage    = "https://www.google.com/chrome/"
risk        = "low"
disclaimer  = "Removes browser caches only. Bookmarks, passwords, and history are not touched. You may be logged out of some sites."

detect = [
  "**/Google/Chrome/User Data/Default/Cache",
  "**/Google/Chrome/User Data/*/Cache",
  "**/Google/Chrome/User Data",
]

[match]
name_contains   = ["Chrome"]
must_have_child = ["User Data"]

[[scope]]
id    = "http-cache"
label = "HTTP cache"
glob  = "**/User Data/*/Cache/**"
mode  = "recycle"

[[scope]]
id    = "code-cache"
label = "Code cache (V8/JS bytecode)"
glob  = "**/User Data/*/Code Cache/**"
mode  = "recycle"

[[scope]]
id    = "gpu-cache"
label = "GPU shader cache"
glob  = "**/User Data/*/GPUCache/**"
mode  = "recycle"

[[scope]]
id    = "service-worker-cache"
label = "Service worker cache"
glob  = "**/User Data/*/Service Worker/CacheStorage/**"
mode  = "recycle"
