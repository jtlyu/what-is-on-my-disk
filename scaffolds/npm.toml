id          = "npm"
name        = "npm cache"
homepage    = "https://docs.npmjs.com/cli/v11/configuring-npm/folders/"
risk        = "low"
disclaimer  = "npm will redownload packages on the next install. Run `npm cache verify` afterwards if you want to be safe."

detect = [
  "%LOCALAPPDATA%/npm-cache",
  "**/.npm/_cacache",
  "${HOME}/.npm/_cacache",
]

[match]
name_contains   = ["npm-cache", "_cacache"]

[[scope]]
id    = "all"
label = "All cached tarballs"
glob  = "**/*"
mode  = "recycle"
