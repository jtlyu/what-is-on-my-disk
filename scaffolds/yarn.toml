id          = "yarn"
name        = "Yarn cache"
homepage    = "https://yarnpkg.com/"
risk        = "low"
disclaimer  = "Yarn will redownload packages on the next install."

detect = [
  "%LOCALAPPDATA%/Yarn/Cache",
  "${HOME}/.yarn/berry/cache",
  "${HOME}/Library/Caches/Yarn",
]

[match]
name_contains   = ["Yarn"]

[[scope]]
id    = "global"
label = "Global cache"
glob  = "**/Cache/**"
mode  = "recycle"
