id          = "firefox"
name        = "Mozilla Firefox"
homepage    = "https://www.mozilla.org/firefox/"
risk        = "low"
disclaimer  = "Removes per-profile caches under cache2. Profiles, bookmarks, and history are preserved."

detect = [
  "**/Mozilla/Firefox/Profiles/*/cache2",
  "**/.mozilla/firefox/*/cache2",
]

[match]
name_contains   = ["firefox", "Firefox"]
must_have_child = ["Profiles"]

[[scope]]
id    = "cache2"
label = "cache2 entries"
glob  = "**/cache2/**"
mode  = "recycle"

[[scope]]
id    = "startup-cache"
label = "Startup cache"
glob  = "**/startupCache/**"
mode  = "recycle"
