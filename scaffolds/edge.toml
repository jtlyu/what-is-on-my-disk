id          = "edge"
name        = "Microsoft Edge"
homepage    = "https://www.microsoft.com/edge"
risk        = "low"
disclaimer  = "Removes browser caches only. Bookmarks, passwords, and history are not touched."

detect = [
  "**/Microsoft/Edge/User Data/Default/Cache",
  "**/Microsoft/Edge/User Data/*/Cache",
  "**/Microsoft/Edge/User Data",
]

[match]
name_contains   = ["Edge"]
must_have_child = ["User Data"]

[[scope]]
id    = "http-cache"
label = "HTTP cache"
glob  = "**/User Data/*/Cache/**"
mode  = "recycle"

[[scope]]
id    = "code-cache"
label = "Code cache"
glob  = "**/User Data/*/Code Cache/**"
mode  = "recycle"

[[scope]]
id    = "gpu-cache"
label = "GPU shader cache"
glob  = "**/User Data/*/GPUCache/**"
mode  = "recycle"

[[scope]]
id    = "service-worker-cache"
label = "Service worker cache"
glob  = "**/User Data/*/Service Worker/CacheStorage/**"
mode  = "recycle"
