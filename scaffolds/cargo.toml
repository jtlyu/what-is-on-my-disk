id          = "cargo"
name        = "Cargo cache"
homepage    = "https://doc.rust-lang.org/cargo/guide/cargo-home.html"
risk        = "medium"
disclaimer  = "Touches only registry and git caches; leaves installed binaries (~/.cargo/bin) alone. Cargo will redownload on next build."

detect = [
  "${HOME}/.cargo",
  "${USERPROFILE}/.cargo",
]

[match]
name_contains   = [".cargo"]
must_have_child = ["registry"]

[[scope]]
id    = "registry-cache"
label = "Registry cache (~/.cargo/registry/cache)"
glob  = "**/registry/cache/**"
mode  = "recycle"

[[scope]]
id    = "registry-src"
label = "Registry sources (~/.cargo/registry/src)"
glob  = "**/registry/src/**"
mode  = "recycle"

[[scope]]
id    = "git-checkouts"
label = "Git checkouts (~/.cargo/git/checkouts)"
glob  = "**/git/checkouts/**"
mode  = "recycle"

[[scope]]
id    = "git-db"
label = "Git db (~/.cargo/git/db)"
glob  = "**/git/db/**"
mode  = "recycle"
