id          = "pnpm"
name        = "pnpm store"
homepage    = "https://pnpm.io/"
risk        = "low"
disclaimer  = "pnpm will rehydrate the store on the next install. After cleaning, run `pnpm store prune` for a tighter cleanup."

detect = [
  "%LOCALAPPDATA%/pnpm-cache",
  "%LOCALAPPDATA%/pnpm/store",
  "${HOME}/.local/share/pnpm/store",
  "${HOME}/Library/pnpm/store",
]

[match]
name_contains   = ["pnpm-cache", "store"]
must_have_child = ["v3"]

[[scope]]
id    = "store"
label = "Content-addressable store"
glob  = "**/store/**"
mode  = "recycle"
